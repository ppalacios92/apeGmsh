name: Docs build check

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'internal_docs/**'
      - 'architecture/**'
      - 'README.md'
      - 'CHANGELOG.md'
      - 'mkdocs.yml'
      - 'src/**'
      - 'pyproject.toml'
      - '.github/workflows/docs-check.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install apt deps for Qt/VTK (for mkdocstrings imports)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1 libegl1 libxkbcommon0 libdbus-1-3 \
            libfontconfig1 libxcb-cursor0 libglu1-mesa

      - name: Install package with docs-building extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[plot,opensees,viewer,dxf,docs]"

      - name: Build site (strict)
        env:
          QT_QPA_PLATFORM: offscreen
          DISABLE_MKDOCS_2_WARNING: "true"
        run: mkdocs build --strict
