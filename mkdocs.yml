site_name: apeGmsh
site_description: Gmsh wrapper for structural FEM workflows with parts, constraints, loads, mass, and OpenSees integration.
site_url: https://nmorabowen.github.io/apeGmsh/
repo_url: https://github.com/nmorabowen/apeGmsh
repo_name: nmorabowen/apeGmsh
edit_uri: edit/main/

docs_dir: docs

# NOTE: mkdocs 1.6.1 supports only warn/info/ignore here — there is no
# 'error' level for anchors. Under --strict (on in CI since ADR 0079
# P2-C) anchor warnings fail the build.
validation:
  links:
    anchors: warn

exclude_docs: |
  _hooks.py
  __pycache__/
  api-flows/_embed.py

hooks:
  - docs/_hooks.py

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - .
      check_paths: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search
  - redirects:
      redirect_maps:
        # ADR 0079: old published guide URLs -> their concepts homes
        internal_docs/guide_basics.md: concepts/session.md
        internal_docs/guide_parts_vs_session.md: concepts/session.md
        internal_docs/guide_cad_import.md: concepts/geometry-and-cad.md
        internal_docs/guide_transforms.md: concepts/geometry-and-cad.md
        internal_docs/guide_meshing.md: concepts/meshing.md
        internal_docs/guide_partitioning.md: concepts/meshing.md
        internal_docs/guide_selection.md: concepts/selection.md
        internal_docs/guide_queries.md: concepts/selection.md
        internal_docs/guide_selection_chain.md: concepts/selection.md
        internal_docs/guide_parts_assembly.md: concepts/parts-and-assembly.md
        internal_docs/guide_sections.md: concepts/sections.md
        internal_docs/guide_constraints.md: concepts/constraints.md
        internal_docs/guide_loads.md: concepts/loads-and-masses.md
        internal_docs/guide_masses.md: concepts/loads-and-masses.md
        internal_docs/guide_fem_broker.md: concepts/fem-broker.md
        internal_docs/guide_opensees.md: concepts/opensees-bridge.md
        internal_docs/guide_results.md: concepts/results.md
        internal_docs/guide_obtaining_results.md: concepts/results.md
        internal_docs/guide_recorders_reference.md: concepts/results.md
        internal_docs/guide_results_filtering.md: concepts/results.md
        internal_docs/first_steps.md: concepts/mental-model.md
        internal_docs/MIGRATION_v1.md: migration.md
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            show_root_heading: true
            show_source: true
            show_if_no_docstring: false
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            docstring_section_style: table
            merge_init_into_class: true
            filters:
              - "!^_"

